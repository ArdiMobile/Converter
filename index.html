<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galmee Video to MP3 Converter</title>

  <link rel="stylesheet" href="/static/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="topbar">
  <div class="logo">
    <span class="g">G</span>
    <span class="name">Galmee</span>
  </div>

  <button class="menu-btn">
    <i class="fa-solid fa-bars"></i>
  </button>
</header>

<!-- HERO -->
<section class="hero">

  <h1>Online Video to MP3 Converter</h1>

  <p class="subtitle">
    Upload your video and convert it to high quality MP3 instantly
  </p>

  <!-- UPLOAD BOX -->
  <div class="upload-box">

    <div class="upload-icon">
      <i class="fa-solid fa-music"></i>
    </div>

    <input
      type="file"
      id="fileInput"
      accept="video/*"
      hidden
    >

    <button class="select-btn" onclick="openPicker()">
      Select Video
    </button>

    <p id="fileName">No file selected</p>

    <!-- PROGRESS -->
    <div class="progress-area" id="progressArea">

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <p id="progressText">Uploading...</p>

    </div>

    <!-- ACTION -->
    <button class="convert-btn" onclick="uploadVideo()">
      Convert to MP3
    </button>

    <!-- RESULT -->
    <div id="result"></div>

  </div>

</section>

<!-- FEATURES -->
<section class="features">

  <div class="feature-card">
    <i class="fa-solid fa-bolt"></i>
    <h3>Fast Conversion</h3>
  </div>

  <div class="feature-card">
    <i class="fa-solid fa-music"></i>
    <h3>192kbps MP3</h3>
  </div>

  <div class="feature-card">
    <i class="fa-solid fa-shield"></i>
    <h3>Safe & Secure</h3>
  </div>

</section>

<script src="/static/script.js"></script>

</body>
</html>
