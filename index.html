<!DOCTYPE html>

<style>

  background:#f5f7fb;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;

}

.hero {

}

  </div>
  <img src="https://i.imgur.com/8Km9tLL.png">
</section>

<section class="section">
  <h2>Supported Devices</h2>
  <div class="cards">
    <div class="card">📱 iPhone</div>
    <div class="card">📲 iPad</div>
    <div class="card">💻 MacBook</div>

</section>

<section class="section">

  <div class="cards">
    <div class="card">🔥 “Amazing tool”</div>
    <div class="card">🚀 “Super fast”</div>

  </div>
</section>

  © 2026 Kena Mockup
</footer>

</html>
