    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let screenshot = null;
        let currentCategory = "mobile";
        let frameColor = "#1a1a2e";

        // Device configurations
        const allDevices = {
            mobile: {
                iphone15: { name: "iPhone 15 Pro", width: 390, height: 780, fw: 22, type: "mobile", br: 36, sbr: 24 },
                pixel8: { name: "Google Pixel 8", width: 400, height: 820, fw: 18, type: "mobile", br: 32, sbr: 20 },
                iphone14: { name: "iPhone 14", width: 390, height: 760, fw: 20, type: "mobile", br: 36, sbr: 24 }
            },
            tablet: {
                ipad: { name: "iPad Pro", width: 680, height: 880, fw: 32, type: "tablet", br: 24, sbr: 16 },
                ipadair: { name: "iPad Air", width: 650, height: 850, fw: 28, type: "tablet", br: 20, sbr: 14 }
            },
            laptop: {
                macbook: { name: "MacBook Air", width: 880, height: 560, fw: 28, type: "laptop", br: 12, sbr: 6 },
                macbookpro: { name: "MacBook Pro", width: 900, height: 580, fw: 30, type: "laptop", br: 12, sbr: 6 }
            },
            desktop: {
                studio: { name: "Studio Display", width: 960, height: 600, fw: 44, type: "desktop", br: 12, sbr: 6 },
                imac: { name: "iMac 24\"", width: 940, height: 580, fw: 40, type: "desktop", br: 16, sbr: 8 }
            }
        };

        let currentDeviceKey = "iphone15";

        // Initialize
        function init() {
            // Category chip clicks
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    updateDeviceSelect();
                    updatePreview();
                });
            });

            // Color dot clicks
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.addEventListener('click', function() {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    this.classList.add('active');
                    frameColor = this.dataset.color;
                    updatePreview();
                });
            });

            updateDeviceSelect();
            updatePreview();
        }

        function updateDeviceSelect() {
            const select = document.getElementById('deviceSelect');
            const devices = allDevices[currentCategory] || allDevices['mobile'];
            
            select.innerHTML = '';
            Object.keys(devices).forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = devices[key].name;
                select.appendChild(option);
            });
            
            currentDeviceKey = Object.keys(devices)[0];
            select.value = currentDeviceKey;
            document.getElementById('deviceDisplayName').textContent = devices[currentDeviceKey].name;
        }

        function getCurrentDevice() {
            if (currentCategory === 'multi') {
                return allDevices['mobile']['iphone15'];
            }
            return allDevices[currentCategory]?.[currentDeviceKey] || allDevices['mobile']['iphone15'];
        }

        // Color helper
        function adjustColor(hex, amount) {
            const num = parseInt(hex.replace("#",""), 16);
            const R = Math.min(255, Math.max(0, (num >> 16) + amount));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amount));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `rgb(${R},${G},${B})`;
        }

        // Draw device frame
        function drawFrame(ctx, x, y, w, h, type, fw, br) {
            const grad = ctx.createLinearGradient(x, y, x + w, y + h);
            grad.addColorStop(0, adjustColor(frameColor, 30));
            grad.addColorStop(0.5, frameColor);
            grad.addColorStop(1, adjustColor(frameColor, -30));
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, br);
            ctx.fill();
            
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x + 1, y + 1, w - 2, h - 2, br - 1);
            ctx.stroke();
            
            if (type === 'mobile') {
                ctx.fillStyle = adjustColor(frameColor, -20);
                ctx.fillRect(x + w - 2, y + 100, 3, 50);
                
                const nw = w * 0.25;
                ctx.fillStyle = adjustColor(frameColor, -40);
                ctx.beginPath();
                ctx.roundRect(x + (w - nw)/2, y + fw - 2, nw, 22, 12);
                ctx.fill();
            }
            
            if (type === 'laptop') {
                const bh = 24;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x - 15, y + h, w + 30, bh, [0, 0, 8, 8]);
                ctx.fill();
                
                ctx.fillStyle = adjustColor(frameColor, -40);
                ctx.beginPath();
                ctx.roundRect(x + 30, y + h + 4, w - 60, 12, 4);
                ctx.fill();
            }
            
            if (type === 'desktop') {
                const sw = 80, sh = 40;
                const sx = x + (w - sw)/2;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(sx + sw*0.2, y + h);
                ctx.lineTo(sx + sw*0.8, y + h);
                ctx.lineTo(sx + sw, y + h + sh);
                ctx.lineTo(sx, y + h + sh);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = adjustColor(frameColor, -20);
                ctx.beginPath();
                ctx.roundRect(sx - 20, y + h + sh, sw + 40, 10, 4);
                ctx.fill();
            }
        }

        function drawSingleDevice(dev, bx, by, scale, rotation) {
            const w = dev.width * scale;
            const h = dev.height * scale;
            
            ctx.save();
            
            if (rotation !== 0) {
                const cx = bx + w/2;
                const cy = by + h/2;
                ctx.translate(cx, cy);
                ctx.rotate(rotation * Math.PI / 180);
                ctx.translate(-cx, -cy);
            }
            
            drawFrame(ctx, bx, by, w, h, dev.type, dev.fw * scale, dev.br * scale);
            
            const sx = bx + dev.fw * scale;
            const sy = by + dev.fw * scale;
            const sw = w - (dev.fw * scale * 2);
            const sh = h - (dev.fw * scale * 2);
            
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(sx, sy, sw, sh, dev.sbr * scale);
            ctx.clip();
            
            if (screenshot && screenshot.complete && screenshot.naturalWidth > 0) {
                const r = Math.max(sw / screenshot.width, sh / screenshot.height);
                const iw = screenshot.width * r;
                const ih = screenshot.height * r;
                ctx.drawImage(screenshot, sx + (sw - iw)/2, sy + (sh - ih)/2, iw, ih);
            } else {
                ctx.fillStyle = "#e8e0f0";
                ctx.fillRect(sx, sy, sw, sh);
                ctx.fillStyle = "#a0a0c0";
                ctx.font = "bold 16px 'Plus Jakarta Sans'";
                ctx.textAlign = "center";
                ctx.fillText("Generate to preview", sx + sw/2, sy + sh/2);
            }
            
            ctx.restore();
            ctx.restore();
        }

        function drawMultiLayout() {
            const mobile = allDevices['mobile']['iphone15'];
            const tablet = allDevices['tablet']['ipad'];
            const laptop = allDevices['laptop']['macbook'];
            
            drawSingleDevice(laptop, 40, 180, 0.65, -3);
            drawSingleDevice(tablet, 580, 250, 0.5, 2);
            drawSingleDevice(mobile, 430, 350, 0.4, -5);
        }

        function updatePreview() {
            currentDeviceKey = document.getElementById('deviceSelect').value;
            const dev = getCurrentDevice();
            document.getElementById('deviceDisplayName').textContent = dev.name;
            document.getElementById('displayName').textContent = document.getElementById('mockupName').value || 'My Mockup';
            
            canvas.width = 1200;
            canvas.height = 800;
            
            const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bg.addColorStop(0, "#faf6ff");
            bg.addColorStop(1, "#f0e8ff");
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const zoom = parseFloat(document.getElementById('zoomRange').value);
            const rotation = parseInt(document.getElementById('rotationRange').value);
            
            if (currentCategory === 'multi') {
                drawMultiLayout();
            } else {
                const scale = 0.85 * zoom;
                const w = dev.width * scale;
                const h = dev.height * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h) / 2;
                drawSingleDevice(dev, x, y, scale, rotation);
            }
            
            // Watermark
            ctx.fillStyle = "rgba(129,0,209,0.08)";
            ctx.font = "bold 24px 'Plus Jakarta Sans'";
            ctx.textAlign = "center";
            ctx.fillText("KENA MOCKUP", canvas.width/2, canvas.height - 30);
            
            document.getElementById('emptyState').style.display = screenshot ? 'none' : 'block';
        }

        function updateZoomLabel() {
            document.getElementById('zoomValue').textContent = document.getElementById('zoomRange').value + 'x';
        }

        function updateRotationLabel() {
            document.getElementById('rotationValue').textContent = document.getElementById('rotationRange').value + '°';
        }

        // Load screenshot
        function loadPreview() {
            let url = document.getElementById("url").value.trim();
            if (!url) { url = "yasing.com.et"; document.getElementById("url").value = url; }
            if (!url.startsWith("http")) url = "https://" + url;

            showLoading();
            
            const api1 = `https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true&embed=screenshot.url&viewport.width=1440&viewport.height=900&deviceScale=2`;
            const api2 = `https://image.thum.io/get/width/1440/crop/900/${url}`;

            tryLoad(api1, () => {
                tryLoad(api2, () => {
                    hideLoading();
                    alert("Could not generate screenshot. Please try another URL.");
                });
            });
        }

        function tryLoad(src, fail) {
            screenshot = new Image();
            screenshot.crossOrigin = "anonymous";
            screenshot.onload = () => { hideLoading(); updatePreview(); };
            screenshot.onerror = () => fail();
            screenshot.src = src;
        }

        function downloadMockup() {
            if (!screenshot || !screenshot.complete) {
                alert("Please generate a mockup first!");
                return;
            }
            
            const temp = document.createElement("canvas");
            const scale = 2;
            temp.width = canvas.width * scale;
            temp.height = canvas.height * scale;
            const tctx = temp.getContext("2d");
            tctx.scale(scale, scale);
            tctx.drawImage(canvas, 0, 0);
            
            const name = document.getElementById('mockupName').value || 'mockup';
            const link = document.createElement("a");
            link.download = `${name.replace(/\s+/g, '-').toLowerCase()}-${Date.now()}.png`;
            link.href = temp.toDataURL("image/png");
            link.click();
        }

        function showLoading() { document.getElementById("loading").style.display = "block"; }
        function hideLoading() { document.getElementById("loading").style.display = "none"; }

        // RoundRect polyfill
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
            if (Array.isArray(r)) r = { tl: r[0], tr: r[1] || r[0], br: r[2] || r[0], bl: r[3] || r[0] };
            this.moveTo(x + r.tl, y);
            this.lineTo(x + w - r.tr, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
            this.lineTo(x + w, y + h - r.br);
            this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
            this.lineTo(x + r.bl, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
            this.lineTo(x, y + r.tl);
            this.quadraticCurveTo(x, y, x + r.tl, y);
            this.closePath();
            return this;
        };

        // Initialize on load
        window.onload = init;
        document.getElementById('deviceSelect').addEventListener('change', updatePreview);
    </script>
</body>
</html>
