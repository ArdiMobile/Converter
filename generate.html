<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Mockup</title>

<style>
body {
  font-family: Arial;
  background:#eef2f6;
  text-align:center;
}

input {
  padding:12px;
  width:60%;
  border-radius:20px;
  border:none;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#6366f1;
  color:#fff;
  margin:10px;
  cursor:pointer;
}

canvas {
  margin-top:30px;
  max-width:95%;
  background:#fff;
  border-radius:20px;
}
</style>
</head>

<body>

<h1>Generate Mockup</h1>

<input id="url" placeholder="Enter website URL">
<br>
<button onclick="loadPreview()">Generate</button>
<button onclick="download()">Download</button>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let screenshot = new Image();
screenshot.crossOrigin = "anonymous";

/* FRAME CONFIG */
const frames = {
  iphone: {
    src: "assets/iphone.png",
    w: 300, h: 600,
    screen: { x:20, y:40, w:260, h:520 }
  },
  ipad: {
    src: "assets/ipad.png",
    w: 400, h: 550,
    screen: { x:30, y:30, w:340, h:490 }
  },
  macbook: {
    src: "assets/macbook.png",
    w: 700, h: 450,
    screen: { x:60, y:40, w:580, h:320 }
  }
};

const frameImgs = {};

/* LOAD FRAMES */
Object.keys(frames).forEach(key=>{
  const img = new Image();
  img.src = frames[key].src;
  frameImgs[key] = img;
});

/* LOAD SCREENSHOT */
function loadPreview() {
  let url = document.getElementById("url").value.trim();
  if (!url.startsWith("http")) url = "https://" + url;

  const api = `https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true&embed=screenshot.url`;

  screenshot.onload = draw;
  screenshot.onerror = ()=> alert("Screenshot failed");

  screenshot.src = api;
}

/* DRAW FRAME */
function drawFrame(key, x, y, scale) {
  const f = frames[key];
  const frame = frameImgs[key];

  const fw = f.w * scale;
  const fh = f.h * scale;

  const sx = x + f.screen.x * scale;
  const sy = y + f.screen.y * scale;
  const sw = f.screen.w * scale;
  const sh = f.screen.h * scale;

  if (screenshot.complete) {
    const r = Math.max(sw / screenshot.width, sh / screenshot.height);
    const iw = screenshot.width * r;
    const ih = screenshot.height * r;

    ctx.drawImage(
      screenshot,
      sx + (sw - iw)/2,
      sy + (sh - ih)/2,
      iw,
      ih
    );
  }

  ctx.drawImage(frame, x, y, fw, fh);
}

/* MAIN DRAW */
function draw() {
  canvas.width = 1200;
  canvas.height = 700;

  ctx.fillStyle = "#eef2f6";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // laptop
  drawFrame("macbook", 250,150,0.8);

  // tablet
  drawFrame("ipad", 750,200,0.6);

  // phone
  drawFrame("iphone", 500,300,0.5);
}

/* DOWNLOAD HD */
function download() {
  const temp = document.createElement("canvas");
  const scale = 2;

  temp.width = canvas.width * scale;
  temp.height = canvas.height * scale;

  const tctx = temp.getContext("2d");
  tctx.scale(scale, scale);
  tctx.drawImage(canvas,0,0);

  const link = document.createElement("a");
  link.download = "mockup.png";
  link.href = temp.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
